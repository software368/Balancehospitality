<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina niet gevonden | Balance Hospitality Group</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Cormorant+Garamond:wght@300;400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --black: #030303;
            --gold: #c6a355;
            --gold-light: #e2cfa0;
            --gold-dim: #7a6530;
            --white: #ede9e0;
            --white-dim: #8a8680;
            --serif: 'Playfair Display', Georgia, serif;
            --display: 'Cormorant Garamond', Georgia, serif;
            --sans: 'Inter', -apple-system, sans-serif;
        }
        html, body { height: 100%; }
        body {
            font-family: var(--sans);
            background: var(--black);
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            padding: 40px;
            max-width: 560px;
        }
        .logo-mark {
            width: 56px;
            height: 56px;
            border: 1.5px solid var(--gold);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transform: rotate(45deg);
            margin-bottom: 48px;
        }
        .logo-mark span {
            transform: rotate(-45deg);
            font-family: var(--serif);
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--gold);
        }
        .error-code {
            font-family: var(--display);
            font-size: 8rem;
            font-weight: 300;
            background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 40%, var(--gold-dim) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 16px;
        }
        .error-title {
            font-family: var(--display);
            font-size: 1.6rem;
            font-weight: 300;
            color: var(--white);
            margin-bottom: 16px;
        }
        .error-desc {
            font-size: 0.88rem;
            color: var(--white-dim);
            line-height: 1.8;
            margin-bottom: 40px;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 18px 48px;
            border: 1px solid var(--gold);
            color: var(--gold);
            font-size: 0.72rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-family: var(--sans);
            font-weight: 500;
            text-decoration: none;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }
        .back-link::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--gold), #d4b85c);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: -1;
        }
        .back-link:hover { color: var(--black); }
        .back-link:hover::before { transform: scaleX(1); transform-origin: left; }
        .ornament {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin: 24px auto 40px;
        }
        .ornament-line {
            width: 50px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold-dim));
        }
        .ornament-line:last-child {
            background: linear-gradient(90deg, var(--gold-dim), transparent);
        }
        .ornament-diamond {
            width: 6px;
            height: 6px;
            background: var(--gold);
            transform: rotate(45deg);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-mark"><span>B</span></div>
        <div class="error-code">404</div>
        <h1 class="error-title">Pagina niet gevonden</h1>
        <div class="ornament">
            <div class="ornament-line"></div>
            <div class="ornament-diamond"></div>
            <div class="ornament-line"></div>
        </div>
        <p class="error-desc">
            De pagina die je zoekt bestaat niet of is verplaatst.<br>
            Ga terug naar de homepage om onze restaurants en vacatures te bekijken.
        </p>
        <a href="/" class="back-link">Naar Homepage</a>
    </div>
</body>
</html>
